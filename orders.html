<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>계약팀 발주현황 · 서귀포의료원 시설관리팀</title>
<link rel="stylesheet" href="common.css" />
<style>
  body { padding-bottom: 44px; }
  #topbar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    padding: 9px 20px; background: var(--surface); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 50;
  }
  #topbar .brand { font-size: 18px; font-weight: 800; color: var(--ink); text-decoration: none; cursor: pointer; }
  #topbar .brand:active { color: var(--accent); }
  #topbar-right { display: flex; align-items: center; gap: 10px; }
  .nav-link {
    display: flex; align-items: center; gap: 6px; text-decoration: none;
    background: var(--bg); color: var(--ink-soft); border: 1.5px solid var(--line); border-radius: 20px;
    padding: 8px 14px; font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .nav-link:active { background: var(--line); }
  .nav-link-icon { font-size: 16px; }

  #content { max-width: 1600px; margin: 0 auto; padding: 22px; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 11px; margin-bottom: 8px; }
  .panel-head h2 { font-size: 24px; margin: 0; }
  .panel-head-actions { display: flex; gap: 9px; align-items: center; flex-shrink: 0; }
  .panel-sub { color: var(--ink-soft); font-size: 14px; line-height: 1.6; margin: 0 0 18px; padding: 13px 16px; background: var(--bg); border-radius: 11px; }

  .btn-primary {
    background: var(--accent); color: #fff; border: none; border-radius: 11px;
    padding: 12px 22px; font-size: 15.5px; font-weight: 700; cursor: pointer;
  }
  .btn-primary:active { background: #1f3a5f; }
  .btn-secondary {
    background: var(--bg); color: var(--ink); border: 1.5px solid var(--line); border-radius: 11px;
    padding: 11px 20px; font-size: 15.5px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block;
  }

  .sheet-updated-at { font-size: 12.5px; color: var(--dim); margin-right: 4px; }
  .sheet-status { padding: 26px 4px; color: var(--ink-soft); font-size: 15px; line-height: 1.7; }
  .sheet-table-wrap { overflow-x: hidden; border: 1px solid var(--line); border-radius: 11px; background: var(--surface); }
  /* 필요한 열만 고정 폭으로 나눠 가로 스크롤 없이 한 건을 한 줄에 표시한다. */
  .sheet-table-wrap table { width: 100%; table-layout: fixed; border-collapse: collapse; font-size: 11.5px; }
  .sheet-table-wrap th, .sheet-table-wrap td {
    padding: 8px 4px; border-bottom: 1px solid var(--line); text-align: left;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.25; height: 20px;
  }
  .sheet-table-wrap th { background: var(--bg); font-weight: 800; color: var(--ink-soft); font-size: 11px; position: sticky; top: 0; }
  .sheet-table-wrap tbody tr:hover { background: #FAFBF9; }
  .sheet-row-count { color: var(--ink-soft); font-size: 13px; font-weight: 700; }
  @media (max-width: 1050px) {
    #content { padding: 14px 10px; }
    .sheet-table-wrap table { font-size: 10px; }
    .sheet-table-wrap th { font-size: 9.5px; }
    .sheet-table-wrap th, .sheet-table-wrap td { padding: 7px 2px; }
  }
</style>
</head>
<body>

<div id="topbar">
  <a class="brand" href="index.html" title="처음 화면으로 이동">서귀포의료원 시설관리팀</a>
  <div id="topbar-right">
    <a class="nav-link" href="input.html" title="업무 화면으로 이동">
      <span class="nav-link-icon">✏️</span><span class="nav-link-text">업무</span>
    </a>
    <a class="nav-link" href="board.html" title="월간일정 화면으로 이동">
      <span class="nav-link-icon">🗓️</span><span class="nav-link-text">월간일정</span>
    </a>
  </div>
</div>

<div id="content">
  <div class="panel-head">
    <h2>계약팀 발주현황</h2>
    <div class="panel-head-actions">
      <span id="sheet-updated-at" class="sheet-updated-at"></span>
      <a class="btn-secondary" id="sheet-open-external" href="https://docs.google.com/spreadsheets/d/1bVcSMFEydyEt5GlBnwAu1HcUUJzSg9hXYirp3v4qst0/edit?gid=0#gid=0" target="_blank" rel="noopener">구글시트에서 열기 ↗</a>
      <button class="btn-primary" id="sheet-refresh-btn">🔄 새로고침</button>
    </div>
  </div>
  <p class="panel-sub">시설팀의 발주 요청과 계약팀 처리 현황을 보여줍니다. 카드결제완료 항목은 제외하며, 긴 내용은 마우스를 올리면 전체를 확인할 수 있습니다 (편집은 구글시트에서).</p>
  <div id="sheet-status" class="sheet-status"></div>
  <div id="sheet-table-wrap" class="sheet-table-wrap"></div>
</div>

<script type="module">
const SHEET_ID = "1bVcSMFEydyEt5GlBnwAu1HcUUJzSg9hXYirp3v4qst0";
const SHEET_GID = "0";
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`;

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function parseCsv(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else {
        field += c;
      }
    } else if (c === '"') {
      inQuotes = true;
    } else if (c === ",") {
      row.push(field); field = "";
    } else if (c === "\r") {
      /* skip */
    } else if (c === "\n") {
      row.push(field); rows.push(row); row = []; field = "";
    } else {
      field += c;
    }
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows;
}

/* 고정 정보 열은 실제 최대 글자 수에 맞추고, 적요·보완사유가 남은 폭을 나눠 쓴다. */
const COLUMN_CONFIG = [
  { key:"처리구분", label:"처리구분", width:"74px" },
  { key:"적요", label:"적요", width:null },
  { key:"금액", label:"금액", width:"72px" },
  { key:"희망발주일", label:"희망발주", width:"72px" },
  { key:"등록일", label:"등록일", width:"72px" },
  { key:"요청번호", label:"요청번호", width:"86px" },
  { key:"처리상태", label:"처리상태", width:"58px" },
  { key:"접수확인일", label:"접수확인", width:"72px" },
  { key:"예상발주일", label:"예상발주", width:"72px" },
  { key:"실제발주일", label:"실제발주", width:"72px" },
  { key:"보완사항·지연사유", label:"보완·지연사유", width:null },
  { key:"계약팀 담당자", label:"담당자", width:"48px" },
  { key:"최종수정일", label:"최종수정", width:"112px" },
  { key:"처리경과일", label:"경과일", width:"42px" }
];
function renderSheetTable(rows) {
  const wrap = document.getElementById("sheet-table-wrap");
  const header = rows[0].map(value => String(value || "").trim());
  const processingTypeIndex = header.indexOf("처리구분");
  const subjectIndex = header.indexOf("적요");
  const columns = COLUMN_CONFIG
    .map(config => ({ ...config, index:header.indexOf(config.key) }))
    .filter(config => config.index >= 0);
  const body = rows.slice(1).filter(row => {
    const processingType = String(row[processingTypeIndex] || "").replace(/\s+/g, "");
    const hasVisibleValue = columns.some(column => String(row[column.index] || "").trim());
    const hasSubject = String(row[subjectIndex] || "").trim().length > 0;
    return hasVisibleValue && hasSubject && processingType !== "카드결제완료";
  });
  let html = "<table><colgroup>";
  columns.forEach(column => { html += column.width ? `<col style="width:${column.width}">` : "<col>"; });
  html += "</colgroup><thead><tr>";
  columns.forEach(column => {
    html += `<th title="${escapeHtml(column.key)}">${escapeHtml(column.label)}</th>`;
  });
  html += "</tr></thead><tbody>";
  body.forEach(r => {
    html += "<tr>";
    columns.forEach(column => {
      const value = r[column.index] || "";
      html += `<td title="${escapeHtml(value)}">${escapeHtml(value)}</td>`;
    });
    html += "</tr>";
  });
  if (!body.length) html += `<tr><td colspan="${columns.length}" style="text-align:center;padding:24px;color:var(--dim);">표시할 발주 요청이 없습니다.</td></tr>`;
  html += "</tbody></table>";
  wrap.innerHTML = html;
  return body.length;
}

let sheetDataLoaded = false;
async function loadSheetData(force) {
  if (sheetDataLoaded && !force) return;
  const status = document.getElementById("sheet-status");
  const wrap = document.getElementById("sheet-table-wrap");
  const updatedAt = document.getElementById("sheet-updated-at");
  status.textContent = "불러오는 중...";
  status.style.display = "block";
  wrap.innerHTML = "";
  try {
    const res = await fetch(SHEET_CSV_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCsv(text).filter(r => r.some(c => (c || "").trim() !== ""));
    if (rows.length === 0) {
      status.textContent = "표시할 데이터가 없습니다.";
      return;
    }
    const itemCount = renderSheetTable(rows);
    status.style.display = "none";
    sheetDataLoaded = true;
    updatedAt.innerHTML = `<span class="sheet-row-count">${itemCount}건</span> · 마지막 갱신 ${new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" })}`;
  } catch (err) {
    status.innerHTML = "시트를 불러오지 못했습니다 (" + escapeHtml(err.message || "네트워크 오류") + ").<br>위의 \"구글시트에서 열기\" 버튼으로 원본을 확인해주세요.";
  }
}

document.getElementById("sheet-refresh-btn").addEventListener("click", () => loadSheetData(true));
loadSheetData(false);
</script>
</body>
</html>

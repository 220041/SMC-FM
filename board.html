<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>시설관리팀 월간일정</title>
<link rel="stylesheet" href="common.css" />
<style>
  html, body { height: 100%; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; transition: transform 8s ease-in-out; }

  /* ── 상단 바 ───────────────────────────── */
  #topbar {
    display: grid;
    grid-template-columns: max-content minmax(220px, 1fr) max-content;
    column-gap: clamp(12px, 2vw, 32px);
    align-items: center;
    padding: 8px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  #topbar .brand { font-size: clamp(15px, 1.35vw, 21px); font-weight: 800; justify-self: start; color: var(--ink); text-decoration: none; cursor: pointer; white-space: nowrap; }
  #topbar .brand:active { color: var(--accent); }
  #topbar-nav { display: flex; align-items: center; gap: 14px; justify-self: center; min-width: 0; }
  #topbar-nav .month-title { font-size: clamp(15px, 1.2vw, 19px); font-weight: 900; min-width: 130px; text-align: center; cursor: pointer; }
  #topbar-nav .month-title:active { color: var(--accent); }
  .tb-nav-btn {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: var(--bg); color: var(--accent);
    font-size: 15px; font-weight: 900; cursor: pointer; line-height: 1; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .tb-nav-btn:active { background: var(--line); }
  .tb-nav-btn:disabled { color: var(--dim); cursor: default; }
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; vertical-align: middle;
    border: 1.5px solid var(--line); border-radius: 7px; background: var(--bg);
    color: var(--ink-soft); font-size: 12px; line-height: 1; cursor: pointer; padding: 0;
  }
  .icon-btn:active { background: var(--line); }
  .icon-btn.is-active { color: var(--accent); border-color: var(--accent); }
  .icon-btn.is-muted { color:var(--alert); border-color:var(--alert); background:var(--alert-bg); }
  #clock { font-size: clamp(13px, 1.15vw, 18px); font-weight: 700; color: var(--ink-soft); font-variant-numeric: tabular-nums; white-space: nowrap; flex: 0 0 auto; }
  #topbar-right { display: flex; align-items: center; gap: 12px; justify-self: end; flex-wrap: nowrap; white-space: nowrap; min-width: max-content; }
  .nav-link {
    display: flex; align-items: center; gap: 6px; text-decoration: none;
    background: var(--bg); color: var(--ink-soft); border: 1.5px solid var(--line); border-radius: 18px;
    padding: 6px 12px; font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .nav-link:active { background: var(--line); }
  .nav-link-icon { font-size: 16px; }

  /* ── 메인 영역: 캘린더 + 알림패널 ───────── */
  #main { display: flex; flex: 1; min-height: 0; padding: 10px 24px 14px; gap: 20px; }

  /* ── 캘린더 ────────────────────────────── */
  #cal-wrap {
    flex: 1 1 78%; display: flex; flex-direction: column; min-width: 0;
    --chip-font: clamp(13px, 1.05vw, 18px);
    --daynum-font: clamp(16px, 1.3vw, 22px);
    --lane-gap: 4px;
    --lane-pad: 4px 8px;
  }
  /* 여유 공간이 많을 때(일정이 적은 달 등) 기본값보다 크게 키우는 단계들 - 여유가 큰 만큼 최대한 활용 */
  #cal-wrap.density-plus-4 { --chip-font: clamp(14px, 1.08vw, 18px); --daynum-font: clamp(18px, 1.35vw, 23px); --lane-gap: 4px; --lane-pad: 4px 8px; }
  #cal-wrap.density-plus-3 { --chip-font: clamp(13.5px, 1.04vw, 17px); --daynum-font: clamp(17px, 1.3vw, 22px); --lane-gap: 4px; --lane-pad: 4px 8px; }
  #cal-wrap.density-plus-2 { --chip-font: clamp(13px, 1vw, 16px); --daynum-font: clamp(16px, 1.25vw, 21px); --lane-gap: 4px; --lane-pad: 3px 7px; }
  #cal-wrap.density-plus-1 { --chip-font: clamp(12.5px, 0.96vw, 16px); --daynum-font: clamp(16px, 1.2vw, 20px); --lane-gap: 3px; --lane-pad: 3px 7px; }
  /* 스크롤이 생길 것 같으면 기본값에서부터 단계별로 축소 */
  #cal-wrap.density-1 { --chip-font: clamp(11.5px, 0.9vw, 15px); --daynum-font: clamp(14px, 1.1vw, 19px); --lane-gap: 3px; --lane-pad: 3px 7px; }
  #cal-wrap.density-2 { --chip-font: clamp(10.5px, 0.8vw, 13px); --daynum-font: clamp(13px, 1vw, 16px); --lane-gap: 2px; --lane-pad: 2px 6px; }
  #cal-wrap.density-3 { --chip-font: clamp(9.5px, 0.7vw, 11.5px); --daynum-font: clamp(12px, 0.9vw, 14px); --lane-gap: 2px; --lane-pad: 2px 5px; }
  /* A busy week gets one extra local compaction pass before any event row is hidden. */
  .cal-week.week-compact .cal-lanes { gap: 1px; padding-bottom: 4px; }
  .cal-week.week-compact .cal-lane { gap: 2px; }
  .cal-week.week-compact .event-chip {
    font-size: clamp(9.5px, .72vw, 12px); line-height: 1.15;
    padding: 2px 5px; border-left-width: 3px; border-radius: 5px;
  }
  .cal-week.week-compact .event-chip.single-day .event-main {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cal-week.week-compact .event-chip.single-day .event-sub { display: none; }
  /* cal-grid-outer를 세로 flex 컨테이너로 만들어, dow-row(고정 높이) 이외의 남는 공간을
     전부 cal-grid에 넘겨주도록 함 (퍼센트 높이 대신 flex로 계산해야 dow-row 높이만큼
     넘치면서 스크롤이 생기는 문제가 없음) */
  #cal-grid-outer { flex: 1; min-height: 0; overflow: hidden; border-radius: var(--radius); display: flex; flex-direction: column; }
  #dow-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
    border: 1px solid var(--line); border-bottom: none;
    flex-shrink: 0;
  }
  #dow-row div {
    text-align: center; padding: 6px 0; font-weight: 800;
    font-size: clamp(13px, 1vw, 17px); color: var(--ink-soft);
  }
  #dow-row div:first-child { color: var(--alert); }
  #dow-row div:last-child { color: var(--accent); }

  #cal-grid {
    display: flex; flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
    flex: 1 1 auto; min-height: 0; /* 일정이 적어 여유 공간이 남을 때, 그 공간을 주(week)마다 균등하게 나눠 갖도록 함 */
  }
  .cal-week { border-bottom: 1px solid var(--line); flex: 0 0 auto; min-height:0; overflow:hidden; display: flex; flex-direction: column; }
  .cal-week:last-child { border-bottom: none; }
  .cal-daynums {
    display: grid; grid-template-columns: repeat(7, 1fr); flex-shrink:0;
  }
  .day-cell {
    background: var(--surface); padding: 6px 6px 2px; min-width: 0; min-height: 40px;
  }
  .day-cell.other-month { background: #F7F8F6; }
  .day-cell.other-month .day-num { color: var(--dim); }
  .day-num {
    font-size: var(--daynum-font); font-weight: 800; padding: 2px 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .day-num.is-redday { color: var(--alert); }
  .day-num .holiday-name {
    font-size: clamp(10.5px, 0.75vw, 13px); font-weight: 700; color: var(--alert);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1 1 auto; min-width: 0;
  }
  .cal-lanes {
    display: flex; flex-direction: column; gap: var(--lane-gap); padding: 0 6px 8px;
  }
  .cal-lane {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: var(--lane-gap);
  }
  .event-chip {
    font-size: var(--chip-font); font-weight: 600; line-height: 1.3;
    padding: var(--lane-pad); border-radius: 7px;
    border-left: 4px solid transparent;
    overflow: hidden; white-space: normal; overflow-wrap: anywhere; word-break: keep-all; cursor: pointer;
  }
  .event-chip.single-day .event-main { font-weight: inherit; line-height: 1.25; }
  .event-chip.single-day .event-sub { margin-top: 2px; font-size: .82em; line-height: 1.2; opacity: .82; }
  .week-more { flex-shrink:0; text-align:center; padding:2px 6px; border-radius:6px; background:var(--bg); color:var(--accent); font-size:clamp(9px,.72vw,12px); font-weight:900; line-height:1.25; }
  .event-chip.type-공사 { background: var(--type-공사-bg); color: var(--type-공사); border-left-color: var(--type-공사); }
  .event-chip.type-미팅 { background: var(--type-미팅-bg); color: var(--type-미팅); border-left-color: var(--type-미팅); }
  .event-chip.type-업무 { background: var(--type-업무-bg); color: var(--type-업무); border-left-color: var(--type-업무); }
  .event-chip.type-기타 { background: var(--type-기타-bg); color: var(--type-기타); border-left-color: var(--type-기타); }
  /* 주 경계에서 잘린 연속일정: 각진 모서리 + 화살표로 이어짐을 표시 */
  .event-chip.cont-prev { border-top-left-radius: 0; border-bottom-left-radius: 0; }
  .event-chip.cont-next { border-top-right-radius: 0; border-bottom-right-radius: 0; }

  /* ── 범례 ─────────────────────────────── */
  #legend { display: flex; gap: 18px; justify-content: center; margin-top: 10px; flex-shrink: 0; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: clamp(12px, 0.9vw, 15px); font-weight: 700; color: var(--ink-soft); }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .legend-dot.type-공사 { background: var(--type-공사); }
  .legend-dot.type-미팅 { background: var(--type-미팅); }
  .legend-dot.type-업무 { background: var(--type-업무); }
  .legend-dot.type-기타 { background: var(--type-기타); }

  /* ── 우측 알림 패널 ────────────────────── */
  #alert-panel {
    flex: 1 1 22%; max-width: 300px; min-width: 220px;
    display: flex; flex-direction: column; min-height: 0;
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--line); overflow: hidden;
  }
  #alert-panel h2 {
    font-size: clamp(16px, 1.3vw, 22px); margin: 0; padding: 16px 18px 12px;
    border-bottom: 1px solid var(--line); flex-shrink: 0;
  }
  #alert-list { flex: 1 1 55%; overflow-y: auto; padding: 12px 14px; min-height: 0; }
  .alert-card {
    background: var(--alert-bg); border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
    cursor: pointer; border: 1px solid #EFC9C9;
  }
  .alert-card .title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  .alert-card .alert-line { display: flex; align-items: baseline; gap: 5px; overflow: hidden; }
  .alert-card .alert-line .title { flex: 1 1 auto; }
  .alert-card .alert-sep { color: var(--dim); flex-shrink: 0; }
  .alert-card .alert-line .assignee-name { flex-shrink: 0; margin-top: 0; }
  .alert-card .title { font-weight: 800; font-size: clamp(13px, 1vw, 16px); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .alert-card .meta { font-size: clamp(11px, 0.8vw, 13px); color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .alert-card .urgency-tag {
    display: inline-block; font-size: 11px; font-weight: 800; padding: 2px 7px; border-radius: 6px;
    flex-shrink: 0; vertical-align: middle;
  }
  .alert-card .count-tag {
    display: inline-block; font-size: 10.5px; font-weight: 800; padding: 1px 6px; border-radius: 6px;
    flex-shrink: 0; background: var(--alert); color: #fff;
  }
  .urgency-상 { background: #C23B3B; color: #fff; }
  .urgency-중 { background: #E1A63B; color: #fff; }
  .urgency-하 { background: #9AA5B1; color: #fff; }

  /* 미확인 알림/완료 목록에 메모와 관련업무를 함께 표시하기 위한 종류 태그 */
  .type-tag {
    display: inline-block; font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 5px;
    flex-shrink: 0; background: var(--dim-bg); color: var(--ink-soft); vertical-align: middle;
  }
  .type-tag-ticket { background: var(--type-업무-bg); color: var(--type-업무); }
  .status-tag-요청됨 { background: var(--type-미팅-bg); color: var(--type-미팅); }
  .status-tag-진행중 { background: #FDF2D9; color: #A9740A; }
  .status-tag-완료 { background: var(--type-업무-bg); color: var(--type-업무); }
  .status-tag-보류 { background: var(--dim-bg); color: var(--dim); }

  .assignee-line { margin-top: 4px; font-size: clamp(12px, 0.95vw, 15px); color: var(--ink-soft); }
  .assignee-name { font-size: clamp(14px, 1.08vw, 18px); font-weight: 900; color: var(--ink); margin-left: 3px; }

  /* 24시간 이내: 은은하게 밝아졌다 어두워지는 디밍 효과 / 24시간 경과: 빨간색으로 또렷하게 깜빡임 */
  @keyframes alert-dim-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.28; transform: scale(0.985); } }
  .alert-card.pulsing { animation: alert-dim-pulse 1.6s ease-in-out infinite; }
  @keyframes alert-red-blink {
    0%, 100% { background-color: var(--alert-bg); border-color: #EFC9C9; }
    50% { background-color: #F3A0A0; border-color: var(--alert); }
  }
  .alert-card.urgent-blink { animation: alert-red-blink 0.9s ease-in-out infinite; }

  #done-section { flex: 1 1 45%; border-top: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
  #done-section h3 {
    font-size: 14px; color: var(--ink-soft); margin: 0; padding: 10px 18px; flex-shrink: 0;
  }
  #done-list { flex: 1; overflow-y: auto; padding: 0 14px 14px; }
  .progress-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 7px 12px; margin-bottom: 6px;
    font-size: 12.5px; color: var(--ink-soft); overflow: hidden; cursor: pointer;
  }
  .progress-card .title-row { display: flex; align-items: center; gap: 6px; }
  .progress-card .title {
    color: var(--ink); font-weight: 700; margin-bottom: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .progress-card > div:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .progress-card.stalled { background: var(--type-미팅-bg); border-color: var(--accent); }
  .progress-card.stalled .title { color: var(--accent); }
  @keyframes progress-blue-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .progress-card.stalled { animation: progress-blue-pulse 1.8s ease-in-out infinite; }
  .progress-card.hold { background: var(--dim-bg); color: var(--dim); }
  .progress-card.hold .title { color: var(--ink-soft); }

  #progress-nav { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 8px 14px 12px; flex-shrink: 0; }
  #progress-page-info { font-size: 12.5px; color: var(--ink-soft); font-weight: 700; min-width: 46px; text-align: center; }

  .empty-alert { padding: 30px 14px; text-align: center; color: var(--ink-soft); font-size: 14px; }

  /* ── 전자칠판 보조화면 (번인 방지용, 30분마다 5분씩 자동 표출) ───── */
  #aux-screen {
    display: none; flex: 1; min-height: 0; flex-direction: column; gap: 16px; padding: 22px 26px 18px;
    --aux-row-pad:8px 4px; --aux-list-pad:10px 14px; --aux-font:clamp(13px,1vw,16px); --aux-head-pad:12px 16px;
  }
  .fade-el {
    transition: opacity 0.6s ease-in-out;
    opacity: 1;
  }
  .fade-el.fade-out {
    opacity: 0;
  }
  #aux-clock-box { text-align: center; }
  #aux-date { font-size: clamp(15px, 1.4vw, 20px); font-weight: 700; color: var(--ink-soft); margin-bottom: 4px; }
  #aux-time {
    font-size: clamp(38px, 6vw, 68px); font-weight: 900; color: var(--ink);
    font-variant-numeric: tabular-nums; letter-spacing: 1px;
  }
  #aux-body { display: grid; grid-template-columns:repeat(2,minmax(0,1fr)); grid-template-rows:repeat(2,minmax(0,1fr)); gap: 16px; flex: 1; min-height: 0; }
  #aux-alert-col, #aux-week-col, #aux-due-section, #aux-today-section {
    min-width: 0; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    display: flex; flex-direction: column; min-height: 0;
  }
  #aux-alert-col h3, #aux-week-col h3, #aux-due-section h3, #aux-today-section h3 {
    font-size: clamp(14px, 1.1vw, 17px); margin: 0; padding:var(--aux-head-pad); flex-shrink: 0; border-bottom: 1px solid var(--line);
  }
  #aux-alert-list, #aux-week-list, #aux-due-list, #aux-today-list { flex: 1; min-height:0; overflow:hidden; padding:var(--aux-list-pad); }
  .agenda-row {
    display: flex; align-items: baseline; gap: 9px; padding:var(--aux-row-pad); border-bottom: 1px dashed var(--line);
    font-size:var(--aux-font); cursor: pointer;
  }
  .agenda-row:last-child { border-bottom: none; }
  .agenda-date {
    flex-shrink: 0; font-weight: 800; color: var(--accent); min-width: 74px;
  }
  .agenda-title { flex: 1 1 auto; font-weight: 700; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .agenda-assignee { flex-shrink: 0; color: var(--ink-soft); font-size: 0.9em; }
  .agenda-day-group { padding:0 2px 5px; }
  .agenda-day-group + .agenda-day-group { border-top:2px solid var(--line); padding-top:8px; margin-top:5px; }
  .agenda-day-head { font-size:calc(var(--aux-font) + 1px); font-weight:900; color:var(--accent); margin:0 2px 3px; }
  .agenda-day-head.is-today { color:var(--today); }
  .week-columns { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; align-items:start; }
  .week-column { min-width:0; }
  .week-column + .week-column { border-left:2px solid var(--line); padding-left:10px; }
  .today-grid { display:grid; grid-template-columns:repeat(var(--today-columns,1),minmax(0,1fr)); gap:7px; align-content:start; }
  .today-grid .agenda-row {
    display:grid; grid-template-columns:minmax(58px,auto) minmax(0,1fr); column-gap:0; row-gap:2px;
    align-items:center; padding:0; min-height:max(48px, calc(var(--aux-font) * 3.6)); overflow:hidden;
    border:1px solid var(--line); border-radius:9px; background:#fff;
  }
  .today-grid .agenda-date {
    grid-row:1 / span 2; min-width:auto; align-self:stretch; padding:8px 10px;
    display:flex; align-items:center; justify-content:center; background:var(--bg);
    border-right:1px solid var(--line); font-variant-numeric:tabular-nums;
  }
  .today-grid .agenda-title { grid-column:2; padding:8px 10px 0; align-self:end; }
  .today-grid .agenda-assignee {
    grid-column:2; padding:0 10px 8px; align-self:start;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .today-grid .agenda-assignee::before { content:"담당 · "; color:var(--dim); font-size:.9em; }
  .due-label { flex-shrink:0; min-width:78px; font-weight:900; color:var(--accent); }
  .due-label.is-overdue { color:var(--alert); }
  .due-label.is-today { color:#B26A00; }
  #aux-screen.clock-only-mode { justify-content:center; align-items:center; }
  #aux-screen.clock-only-mode #aux-clock-box { width:100%; }
  #aux-screen.clock-only-mode #aux-date, #aux-screen.clock-only-mode #aux-body { display:none; }
  #aux-screen.clock-only-mode #aux-time { font-size:clamp(110px,18vw,260px); letter-spacing:4px; }
  #aux-screen.aux-density-1 { --aux-row-pad:6px 3px; --aux-list-pad:8px 11px; --aux-font:clamp(12px,.9vw,14px); --aux-head-pad:9px 13px; }
  #aux-screen.aux-density-2 { --aux-row-pad:4px 2px; --aux-list-pad:6px 9px; --aux-font:clamp(11px,.82vw,13px); --aux-head-pad:7px 11px; }
  #aux-screen.aux-density-3 { --aux-row-pad:3px 2px; --aux-list-pad:4px 7px; --aux-font:clamp(10px,.74vw,12px); --aux-head-pad:6px 9px; }
  #aux-screen.aux-density-4 { --aux-row-pad:1px 1px; --aux-list-pad:2px 5px; --aux-font:clamp(9px,.66vw,11px); --aux-head-pad:4px 7px; }
  #aux-screen.aux-density-1 .alert-card { padding:8px 9px; margin-bottom:6px; }
  #aux-screen.aux-density-2 .alert-card { padding:6px 8px; margin-bottom:4px; }
  #aux-screen.aux-density-3 .alert-card { padding:4px 6px; margin-bottom:3px; }
  #aux-screen.aux-density-4 .alert-card { padding:2px 4px; margin-bottom:1px; }
  #aux-screen.aux-density-2 .alert-card .title, #aux-screen.aux-density-3 .alert-card .title, #aux-screen.aux-density-4 .alert-card .title { font-size:var(--aux-font); }
  #aux-screen.aux-density-2 .alert-card .assignee-line, #aux-screen.aux-density-3 .alert-card .assignee-line, #aux-screen.aux-density-4 .alert-card .assignee-line { margin-top:2px; font-size:var(--aux-font); }
  #aux-screen.aux-density-2 .agenda-day-head, #aux-screen.aux-density-3 .agenda-day-head, #aux-screen.aux-density-4 .agenda-day-head { font-size:calc(var(--aux-font) + 1px); }
  #aux-screen.aux-density-2 .week-columns, #aux-screen.aux-density-3 .week-columns, #aux-screen.aux-density-4 .week-columns { gap:6px; }
  #aux-screen.aux-density-2 .week-column + .week-column, #aux-screen.aux-density-3 .week-column + .week-column, #aux-screen.aux-density-4 .week-column + .week-column { padding-left:6px; }
  #aux-screen.aux-density-3 .today-grid, #aux-screen.aux-density-4 .today-grid { gap:4px; }

  /* ── 이름 선택 모달 ────────────────────── */
  #name-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center; z-index: 1000;
  }
  #name-modal {
    background: var(--surface); border-radius: 20px; padding: 32px 36px;
    text-align: center; min-width: 380px;
  }
  #name-modal h3 { margin: 0 0 6px; font-size: 20px; }
  #name-modal p { margin: 0 0 20px; color: var(--ink-soft); font-size: 14px; }
  #name-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .name-btn {
    padding: 18px 10px; font-size: 17px; font-weight: 800;
    border-radius: 12px; border: 2px solid var(--line); background: var(--bg);
    cursor: pointer; color: var(--ink);
  }
  .name-btn:active { background: var(--accent); color: #fff; }
  #name-cancel { margin-top: 18px; background: none; border: none; color: var(--ink-soft); font-size: 14px; cursor: pointer; }

  /* ── 날짜 확대보기 (노안 배려) ────────────── */
  .day-cell { cursor: pointer; }
  #day-detail-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center; z-index: 900; padding: 24px;
  }
  #day-detail-overlay.open { display: flex; }
  #day-detail-card {
    background: var(--surface); border-radius: 24px; padding: 36px 40px;
    max-width: 720px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative;
  }
  #day-detail-close {
    position: absolute; top: 18px; right: 20px; width: 44px; height: 44px; border-radius: 50%;
    border: none; background: var(--bg); font-size: 26px; font-weight: 900; color: var(--ink-soft); cursor: pointer;
  }
  #day-detail-date { font-size: 30px; font-weight: 900; margin-bottom: 22px; padding-right: 50px; }
  #day-detail-date .dow { font-size: 20px; font-weight: 700; color: var(--ink-soft); margin-left: 10px; }
  .day-detail-event {
    border-left: 6px solid transparent; border-radius: 12px; padding: 16px 18px; margin-bottom: 14px;
    font-size: 19px; font-weight: 700; line-height: 1.5; cursor: pointer;
  }
  .day-detail-event:active { filter: brightness(0.95); }
  .day-detail-event.type-공사 { background: var(--type-공사-bg); color: var(--type-공사); border-left-color: var(--type-공사); }
  .day-detail-event.type-미팅 { background: var(--type-미팅-bg); color: var(--type-미팅); border-left-color: var(--type-미팅); }
  .day-detail-event.type-업무 { background: var(--type-업무-bg); color: var(--type-업무); border-left-color: var(--type-업무); }
  .day-detail-event.type-기타 { background: var(--type-기타-bg); color: var(--type-기타); border-left-color: var(--type-기타); }
  .day-detail-event .dd-meta { font-size: 15px; font-weight: 600; color: var(--ink-soft); margin-top: 6px; }
  #day-detail-empty { font-size: 19px; color: var(--dim); text-align: center; padding: 30px 0; }

  /* ── 개별 일정 상세내역 ────────────────── */
  #event-detail-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center; z-index: 950; padding: 24px;
  }
  #event-detail-overlay.open { display: flex; }
  #event-detail-card {
    background: var(--surface); border-radius: 22px; padding: 32px 36px;
    max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative;
  }
  #event-detail-close {
    position: absolute; top: 16px; right: 18px; width: 40px; height: 40px; border-radius: 50%;
    border: none; background: var(--bg); font-size: 24px; font-weight: 900; color: var(--ink-soft); cursor: pointer;
  }
  #event-detail-title { font-size: 24px; font-weight: 900; margin-bottom: 4px; padding-right: 46px; }
  #event-detail-meta { font-size: 15px; color: var(--ink-soft); margin-bottom: 18px; line-height: 1.6; }
  #event-detail-meta b { color: var(--ink); }
  #event-detail-history .eh-item { padding: 10px 0; border-bottom: 1px dashed var(--line); font-size: 14.5px; }
  #event-detail-history .eh-item:last-child { border-bottom: none; }
  #event-detail-history .eh-meta { color: var(--ink-soft); font-size: 12.5px; margin-bottom: 3px; }
  .event-detail-empty-hist { color: var(--dim); font-size: 14px; padding: 6px 0; }

  /* ── 메모 상세보기 (미확인 알림 / 완료된 항목 공용) ────── */
  #memo-detail-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center; z-index: 950; padding: 24px;
  }
  #memo-detail-overlay.open { display: flex; }
  #memo-detail-card {
    background: var(--surface); border-radius: 22px; padding: 32px 36px;
    max-width: 560px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative;
  }
  #memo-detail-close {
    position: absolute; top: 16px; right: 18px; width: 40px; height: 40px; border-radius: 50%;
    border: none; background: var(--bg); font-size: 24px; font-weight: 900; color: var(--ink-soft); cursor: pointer;
  }
  #memo-detail-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; padding-right: 46px; }
  #memo-detail-meta { font-size: 15px; color: var(--ink-soft); margin-bottom: 16px; line-height: 1.6; }
  #memo-detail-meta b { color: var(--ink); }
  #memo-detail-items .eh-item { padding: 10px 0; border-bottom: 1px dashed var(--line); font-size: 14.5px; }
  #memo-detail-items .eh-item:last-child { border-bottom: none; }
  #memo-detail-items .eh-meta { color: var(--ink-soft); font-size: 13px; }
  #memo-detail-actions { margin-top: 20px; text-align: right; }
  #memo-detail-confirm-btn {
    padding: 10px 22px; font-size: 15px; font-weight: 800;
    background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer;
  }
  #memo-detail-confirm-btn:active { opacity: 0.85; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar" class="fade-el">
    <a class="brand" href="index.html" title="처음 화면으로 이동">서귀포의료원 시설관리팀</a>
    <div id="topbar-nav">
      <button class="tb-nav-btn" id="prev-month">‹</button>
      <div class="month-title" id="month-title" title="클릭하면 이번 달로 이동">-</div>
      <button class="tb-nav-btn" id="next-month">›</button>
    </div>
    <div id="topbar-right">
      <button type="button" id="fullscreen-btn" class="icon-btn" title="전체화면">⛶</button>
      <button type="button" id="aux-preview-btn" class="icon-btn" title="보조화면 미리보기">🖥️</button>
      <button type="button" id="chime-test-btn" class="icon-btn" title="17:26 알림음 테스트" aria-label="17시 26분 알림음 테스트">🔊</button>
      <button type="button" id="sound-mute-btn" class="icon-btn" title="전자칠판 소리 끄기" aria-label="전자칠판 소리 끄기" aria-pressed="false">🔇</button>
      <div id="clock">--:--</div>
      <a class="nav-link" href="input.html" title="업무 화면으로 이동">
        <span class="nav-link-icon">✏️</span><span class="nav-link-text">업무</span>
      </a>
      <a class="nav-link" href="orders.html" title="계약팀 발주현황 화면으로 이동">
        <span class="nav-link-icon">📋</span><span class="nav-link-text">발주현황</span>
      </a>
    </div>
  </div>

  <div id="main" class="fade-el">
    <div id="cal-wrap">
      <div id="cal-grid-outer" class="scrollbar-thin">
        <div id="dow-row">
          <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>
        <div id="cal-grid"></div>
      </div>
      <div id="legend">
        <div class="legend-item"><div class="legend-dot type-공사"></div>공사(작업)</div>
        <div class="legend-item"><div class="legend-dot type-미팅"></div>미팅</div>
        <div class="legend-item"><div class="legend-dot type-업무"></div>업무</div>
        <div class="legend-item"><div class="legend-dot type-기타"></div>기타</div>
      </div>
    </div>

    <div id="alert-panel">
      <h2>🔴 미확인 알림</h2>
      <div id="alert-list" class="scrollbar-thin"></div>
      <div id="done-section">
        <h3>업무진행상황</h3>
        <div id="done-list" class="scrollbar-thin"></div>
        <div id="progress-nav">
          <button type="button" id="progress-prev" class="tb-nav-btn">‹</button>
          <span id="progress-page-info">-</span>
          <button type="button" id="progress-next" class="tb-nav-btn">›</button>
        </div>
      </div>
    </div>
  </div>

  <div id="aux-screen" class="fade-el" tabindex="0" aria-label="보조화면. 누르면 월간일정으로 돌아갑니다" title="누르면 월간일정으로 돌아갑니다">
    <div id="aux-clock-box">
      <div id="aux-date">-</div>
      <div id="aux-time">--:--:--</div>
    </div>
    <div id="aux-body">
      <div id="aux-alert-col">
        <h3>🔴 미확인 알림</h3>
        <div id="aux-alert-list" class="scrollbar-thin"></div>
      </div>
      <div id="aux-week-col">
        <h3>이번주 일정</h3>
        <div id="aux-week-list" class="scrollbar-thin"></div>
      </div>
      <div id="aux-due-section">
        <h3>기한 임박 업무</h3>
        <div id="aux-due-list" class="scrollbar-thin"></div>
      </div>
      <div id="aux-today-section">
        <h3>오늘 일정</h3>
        <div id="aux-today-list" class="scrollbar-thin"></div>
      </div>
    </div>
  </div>
</div>

<div id="name-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="name-modal-title">
  <div id="name-modal" tabindex="-1">
    <h3 id="name-modal-title">확인자 선택</h3>
    <p id="name-modal-sub">이 항목을 확인한 사람을 선택하세요</p>
    <div id="name-buttons"></div>
    <button id="name-cancel">취소</button>
  </div>
</div>

<div id="day-detail-overlay" role="dialog" aria-modal="true" aria-labelledby="day-detail-date">
  <div id="day-detail-card" tabindex="-1">
    <button type="button" id="day-detail-close" aria-label="닫기">×</button>
    <div id="day-detail-date"></div>
    <div id="day-detail-events"></div>
  </div>
</div>

<div id="event-detail-overlay" role="dialog" aria-modal="true" aria-labelledby="event-detail-title">
  <div id="event-detail-card" tabindex="-1">
    <button type="button" id="event-detail-close" aria-label="닫기">×</button>
    <div id="event-detail-title"></div>
    <div id="event-detail-meta"></div>
    <div id="event-detail-history"></div>
  </div>
</div>

<div id="memo-detail-overlay" role="dialog" aria-modal="true" aria-labelledby="memo-detail-title">
  <div id="memo-detail-card" tabindex="-1">
    <button type="button" id="memo-detail-close" aria-label="닫기">×</button>
    <div id="memo-detail-title"></div>
    <div id="memo-detail-meta"></div>
    <div id="memo-detail-items"></div>
    <div id="memo-detail-actions"></div>
  </div>
</div>

<script type="module" src="./board-page.js"></script>
</body>
</html>
